name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall src main.py
      - name: Smoke-test the enhanced main window
        run: |
          python -c "from PySide6.QtWidgets import QApplication; from lifecanvas.enhanced_ui import LifeCanvasWindow; from lifecanvas.widgets import NumberEdit; app=QApplication([]); window=LifeCanvasWindow(); assert len(window.results) > 0; assert isinstance(window.initial_cash, NumberEdit); assert window.tabs.tabText(2) == 'ライフイベント'; window.close(); app.processEvents(); app.quit(); print('Enhanced UI smoke OK')"
