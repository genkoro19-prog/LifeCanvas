name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall src main.py
      - name: Smoke-test the flexible family window
        id: ui_smoke
        continue-on-error: true
        run: |
          python - <<'PY' > ui-smoke.log 2>&1
          import traceback
          try:
              from PySide6.QtWidgets import QApplication
              from PySide6.QtCore import Qt
              from lifecanvas.final_ui import LifeCanvasWindow
              app = QApplication([])
              window = LifeCanvasWindow()
              print('window created')
              assert len(window.results) > 0
              assert window.tabs.tabText(2) == 'ライフイベント'
              assert window.compact_timeline.horizontalScrollBarPolicy() == Qt.ScrollBarAlwaysOff
              assert window.year_table.columnCount() == 15
              assert window.child_editor.table.rowCount() >= 1
              print('flexible family widgets ready')
              window.close()
              app.processEvents()
              app.quit()
              print('Flexible family UI smoke OK')
          except Exception:
              traceback.print_exc()
              raise
          PY
      - name: Show UI smoke log
        if: always()
        run: cat ui-smoke.log
      - name: Upload UI smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flexible-ui-smoke-log
          path: ui-smoke.log
      - name: Fail when UI smoke failed
        if: steps.ui_smoke.outcome == 'failure'
        run: exit 1
