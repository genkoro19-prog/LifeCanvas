name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libegl1 fonts-noto-cjk >/dev/null
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -e ".[dev]" -q
      - name: Run tests in isolated processes
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          : > pytest.log
          for test_file in tests/test_*.py; do
            echo "===== ${test_file} =====" | tee -a pytest.log
            if ! pytest -q "${test_file}" >> pytest.log 2>&1; then
              echo "FAILED_FILE=${test_file}" | tee -a pytest.log
              exit 1
            fi
          done
      - name: Upload pytest diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostic-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7
      - name: Report test failure on PR
        if: steps.pytest.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '## CI test failure'
            echo
            echo '```text'
            tail -c 50000 pytest.log
            echo '```'
          } > pytest-comment.md
          gh pr comment "$PR_NUMBER" --body-file pytest-comment.md
      - name: Stop after test failure
        if: steps.pytest.outcome == 'failure'
        run: |
          tail -c 50000 pytest.log
          exit 1
      - name: Compile Python sources
        run: python -m compileall -q src main.py
      - name: Smoke-test the guided PC window and PDF graph
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory

          from PySide6.QtWidgets import QApplication, QScrollArea
          from PySide6.QtCore import Qt, QCoreApplication
          from lifecanvas.guided_ui import LifeCanvasWindow
          from lifecanvas.pdf_report_v2 import _chart_png_bytes, export_pdf
          from lifecanvas.plotting import configure_japanese_matplotlib

          app = QApplication([])
          window = LifeCanvasWindow()
          assert len(window.results) > 0
          assert window.tabs.tabText(0) == "結果"
          assert window.tabs.tabText(1) == "かんたん入力"
          assert window.tabs.tabText(2) == "詳細設定"
          assert window.tabs.tabText(3) == "ライフイベント"
          assert isinstance(window.tabs.widget(0), QScrollArea)
          assert isinstance(window.guided_input, QScrollArea)
          assert window.guided_input.apply_button.text() == "この内容で人生プランを計算"
          assert window.guided_input.review_list.count() >= 1
          assert window.compact_timeline.horizontalScrollBarPolicy() == Qt.ScrollBarAlwaysOff
          assert window.year_table.columnCount() == 26
          assert window.compare_table.rowCount() == 3
          assert window.child_editor.table.rowCount() >= 1
          assert window.housing_editor.mode.findData("rent") >= 0
          assert window.sample_combo.count() == 2
          assert window.canvas.minimumHeight() >= 430
          assert hasattr(window, "husband_age_income")
          assert hasattr(window, "wife_age_income")
          assert hasattr(window, "car_editor")
          assert hasattr(window, "cashflow_event_editor")
          assert hasattr(window, "card_outlook")
          assert window.figure.axes[0].get_title() == "資産・負債の推移"
          assert configure_japanese_matplotlib() == "Noto Sans CJK JP"

          chart_png = _chart_png_bytes(window.results, window.plan.wallets.mode == "separate")
          assert chart_png.startswith(b"\x89PNG\r\n\x1a\n")
          assert len(chart_png) > 20_000
          with TemporaryDirectory() as directory:
              report = export_pdf(window.plan, window.results, Path(directory) / "report.pdf")
              assert report.exists() and report.stat().st_size > 80_000

          window.close()
          window.deleteLater()
          QCoreApplication.sendPostedEvents(None, 0)
          app.processEvents()
          del window
          app.quit()
          del app
          print("Guided PC UI and PDF smoke OK")
          PY
