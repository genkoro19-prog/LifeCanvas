name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall src main.py
      - name: Smoke-test the flexible family window
        run: |
          python - <<'PY'
          from PySide6.QtWidgets import QApplication
          from PySide6.QtCore import Qt, QCoreApplication
          from lifecanvas.final_ui import LifeCanvasWindow

          app = QApplication([])
          window = LifeCanvasWindow()
          assert len(window.results) > 0
          assert window.tabs.tabText(2) == "ライフイベント"
          assert window.compact_timeline.horizontalScrollBarPolicy() == Qt.ScrollBarAlwaysOff
          assert window.year_table.columnCount() == 15
          assert window.child_editor.table.rowCount() >= 1
          window.close()
          window.deleteLater()
          QCoreApplication.sendPostedEvents(None, 0)
          app.processEvents()
          del window
          app.quit()
          del app
          print("Flexible family UI smoke OK")
          PY
