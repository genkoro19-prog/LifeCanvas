name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y xvfb xauth libxkbcommon-x11-0
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall src main.py
      - name: Smoke-test the main window
        run: xvfb-run -a python -c "from PySide6.QtWidgets import QApplication; from lifecanvas.ui import LifeCanvasWindow; app=QApplication([]); window=LifeCanvasWindow(); assert len(window.results) > 0; window.close(); app.processEvents(); app.quit()"
