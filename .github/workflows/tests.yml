name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libegl1 fonts-noto-cjk
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall src main.py
      - name: Smoke-test the synchronized PC window
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory

          from PySide6.QtWidgets import QApplication, QScrollArea
          from PySide6.QtCore import Qt, QCoreApplication
          from lifecanvas.revision_ui import LifeCanvasWindow
          from lifecanvas.pdf_report_v2 import export_pdf
          from lifecanvas.plotting import configure_japanese_matplotlib

          app = QApplication([])
          window = LifeCanvasWindow()
          assert len(window.results) > 0
          assert window.tabs.tabText(1) == "入力"
          assert window.tabs.tabText(2) == "ライフイベント"
          assert isinstance(window.tabs.widget(0), QScrollArea)
          assert window.compact_timeline.horizontalScrollBarPolicy() == Qt.ScrollBarAlwaysOff
          assert window.year_table.columnCount() == 19
          assert window.child_editor.table.rowCount() >= 1
          assert window.housing_editor.mode.findData("rent") >= 0
          assert window.sample_combo.count() == 2
          assert window.canvas.minimumHeight() >= 430
          assert hasattr(window, "husband_age_income")
          assert hasattr(window, "wife_age_income")
          assert hasattr(window, "car_editor")
          assert hasattr(window, "cashflow_event_editor")
          assert hasattr(window, "card_outlook")
          assert window.figure.axes[0].get_title() == "資産・負債の推移"
          assert configure_japanese_matplotlib() == "Noto Sans CJK JP"
          with TemporaryDirectory() as directory:
              report = export_pdf(window.plan, window.results, Path(directory) / "report.pdf")
              assert report.exists() and report.stat().st_size > 10000
          window.close()
          window.deleteLater()
          QCoreApplication.sendPostedEvents(None, 0)
          app.processEvents()
          del window
          app.quit()
          del app
          print("Synchronized PC UI smoke OK")
          PY
