name: windows-build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Test release window on Windows
        run: python -m pytest -q tests/test_release_window_smoke.py
      - name: Build portable application
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir --name LifeCanvas --paths src main.py
      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/LifeCanvas/LifeCanvas.exe")) { throw "LifeCanvas.exe was not created" }
      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/LifeCanvas/* -DestinationPath LifeCanvas-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: LifeCanvas-Windows
          path: LifeCanvas-Windows.zip
          retention-days: 30
