name: fix-wife-target-test

on:
  push:
    branches: [agent/implement-household-nisa-debt-ui]
    paths:
      - scripts/fix_wife_target_test.py
      - .github/workflows/fix-wife-target-test.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implement-household-nisa-debt-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/fix_wife_target_test.py
      - name: Commit test correction
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests
          git commit -m "Use actual wife income in cash target test"
          git push origin HEAD:agent/implement-household-nisa-debt-ui
