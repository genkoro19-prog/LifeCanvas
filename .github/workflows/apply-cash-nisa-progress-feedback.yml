name: apply-cash-nisa-progress-feedback

on:
  push:
    branches: [agent/implement-household-nisa-debt-ui]
    paths:
      - scripts/apply_cash_nisa_progress_feedback.py
      - .github/workflows/apply-cash-nisa-progress-feedback.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implement-household-nisa-debt-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply feedback patch
        run: python scripts/apply_cash_nisa_progress_feedback.py
      - name: Commit source changes
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests docs
          git commit -m "Add wife cash target and NISA progress visibility"
          git push origin HEAD:agent/implement-household-nisa-debt-ui
