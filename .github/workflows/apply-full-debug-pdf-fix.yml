name: apply-full-debug-pdf-fix

on:
  push:
    branches: [agent/full-debug-and-pdf-chart]
    paths:
      - scripts/apply_full_debug_pdf_fix.py
      - .github/workflows/apply-full-debug-pdf-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-debug-and-pdf-chart
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/apply_full_debug_pdf_fix.py
      - name: Commit fixes and tests
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "Fix interaction refresh and embed PDF chart reliably"
          git push origin HEAD:agent/full-debug-and-pdf-chart
