name: diagnose-sample-balances

on:
  push:
    branches: [agent/implement-household-nisa-debt-ui]
    paths:
      - .github/workflows/diagnose-sample-balances.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implement-household-nisa-debt-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip -q
          pip install -e . -q
      - name: Generate balance diagnostic
        run: |
          mkdir -p docs
          python - <<'PY' > docs/sample_balance_diagnostic.txt
          from lifecanvas.sample import build_genki_family_plan
          from lifecanvas.policy_engine import SimulationEngine

          plan = build_genki_family_plan()
          rows = SimulationEngine(plan).run()
          print('year,husband_cash,wife_cash,husband_household,wife_household,unmet')
          for row in rows:
              print(
                  f'{row.calendar_year},'
                  f'{row.husband_cash_end:.0f},'
                  f'{row.wife_cash_end:.0f},'
                  f'{row.husband_household_paid:.0f},'
                  f'{row.wife_household_paid:.0f},'
                  f'{row.unmet_amount:.0f}'
              )
          print('husband_zero_years=', sum(row.husband_cash_end <= 1 for row in rows))
          print('wife_max=', max(row.wife_cash_end for row in rows))
          print('husband_max=', max(row.husband_cash_end for row in rows))
          PY
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sample_balance_diagnostic.txt
          git commit -m "Add temporary sample balance diagnostic"
          git push origin HEAD:agent/implement-household-nisa-debt-ui
