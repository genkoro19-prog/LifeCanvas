name: fix-wife-target-recommendation

on:
  push:
    branches: [agent/implement-household-nisa-debt-ui]
    paths:
      - scripts/fix_wife_target_recommendation.py
      - .github/workflows/fix-wife-target-recommendation.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implement-household-nisa-debt-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/fix_wife_target_recommendation.py
      - name: Commit source changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "Treat wife target as investment threshold"
          git push origin HEAD:agent/implement-household-nisa-debt-ui
