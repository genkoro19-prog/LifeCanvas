name: apply-nisa-cash-priority-fix

on:
  push:
    branches: [agent/implement-household-nisa-debt-ui]
    paths:
      - scripts/fix_nisa_cash_priority.py
      - .github/workflows/apply-nisa-cash-priority-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implement-household-nisa-debt-ui
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply NISA cash priority fix
        run: python scripts/fix_nisa_cash_priority.py
      - name: Commit source changes
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "Fix NISA cash allocation priority"
          git push origin HEAD:agent/implement-household-nisa-debt-ui
