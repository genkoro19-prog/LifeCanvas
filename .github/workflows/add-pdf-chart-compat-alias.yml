name: add-pdf-chart-compat-alias

on:
  push:
    branches: [agent/full-debug-and-pdf-chart]
    paths:
      - scripts/add_pdf_chart_compat_alias.py
      - .github/workflows/add-pdf-chart-compat-alias.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-debug-and-pdf-chart
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/add_pdf_chart_compat_alias.py
      - name: Commit compatibility fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "Keep PDF chart helper compatibility"
          git push origin HEAD:agent/full-debug-and-pdf-chart
